# Render service configuration for Safari Scouts backend

services:
  - type: web
    name: safari-scouts-backend
    runtime: python
    plan: free
    pythonVersion: 3.11.11
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPEN_WEATHER_API_KEY
        sync: false