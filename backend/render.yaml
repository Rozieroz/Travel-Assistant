# Render service configuration for Safari Scouts backend

services:
  - type: web
    name: safari-scouts-backend
    runtime: docker
    repo: https://github.com/Rozieroz/Travel-Assistant
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPEN_WEATHER_API_KEY
        sync: false